<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowBalance - Legal Documents</title>
    <style>
        /* Estilos básicos para que la página se vea limpia y profesional */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
            line-height: 1.6;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
            margin-top: 0;
        }
        p {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 25px;
        }
        ul {
            list-style-type: none; /* Quitamos las viñetas por defecto */
            padding: 0;
        }
        li {
            margin-bottom: 15px;
            position: relative;
            padding-left: 25px;
        }
        /* Viñeta personalizada */
        li::before {
            content: "•";
            color: #6a5acd; /* Tono púrpura sutil inspirado en tu logo */
            font-weight: bold;
            font-size: 1.5em;
            position: absolute;
            left: 0;
            top: -4px;
        }
        a {
            color: #2b6cb0;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1em;
            transition: color 0.2s ease;
        }
        a:hover {
            color: #6a5acd;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FlowBalance App Documents</h1>

        <p>Welcome to the official documentation portal. Here you will find all legal and startup documents related to the FlowBalance App.</p>

        <ul>
            <li><a href="https://undefinedflow-lab.github.io/flowbalance-docs/terms.html">Terms & Conditions</a></li>
            <li><a href="https://undefinedflow-lab.github.io/flowbalance-docs/privacy.html">Privacy Policy</a></li>
        </ul>
    </div>
</body>
</html>
